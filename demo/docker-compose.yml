version: '3.8'
services:
  app:
    build: .
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.railway.internal:5432/railway
      DB_PASSWORD: BImOGxDXDSqBlmLAjkZFPFZlvGZnlitf
      JWT_SECRET: WWWWWWWWWWLroklogmujhethamlomujheroklomujhe
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: railway
      POSTGRES_PASSWORD: BImOGxDXDSqBlmLAjkZFPFZlvGZnlitf
    ports:
      - "8081:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: